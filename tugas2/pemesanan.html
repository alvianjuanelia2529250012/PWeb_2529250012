<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pemesanan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logo">
        <img style="width: 20%;border-radius: 3vw;" src="Image/logo part 2.jpg" alt="">
        <div>
            <h1 class="p">Kotak TopUP</h1>
            <H3 class="p">Topup Trusted dan Cepat</H3>
        </div>
    </div>
<hr style="height: 2px;background-color: black;">
<div class="nama">
    <h5 style="text-align: center;" class="q">Silahkan masukan username</h5>
        <input style="display: block; margin: 0 auto; width: 20%;" type="text">
</div>
<hr style="height: 2px;background-color: black;">
<div style="background-color: rgb(43, 153, 226);" class="apes1">
    <form>
                <h5 class="q">Pilih Metode Pembayaran:</h5>
  
                <input type="radio" id="dana" name="payment" value="dana">
                <label for="dana">DANA</label><br>

                <input type="radio" id="gopay" name="payment" value="gopay">
                <label for="gopay">GoPay</label><br>

                <input type="radio" id="ovo" name="payment" value="ovo">
                <label for="ovo">OVO</label>
            </form>
</div>
<div style="background-color: aqua;" class="apes2">
    <label for="game">Silahkan pilih game</label><br>
                <select id="game" name="pilih_game">
                <option value="gi">Genshin Impact</option>
                <option value="hsr">Honkai Star Rail</option>
                <option value="zzz">Zenless Zone Zero</option>
                <option value="arkend">Arkinght Endfield</option>
                </select>
</div>
<div style="background-color: rgb(43, 153, 226);" class="apes3">
            <h5 style="margin-bottom: 2px;" class="q">masukan nomor telepon</h5>
            <input type="text">
            <h5 style="margin-top: 10px; margin-bottom: 2px;" class="q">masukan email</h5>
            <input type="text">
            <h5 style="margin-top: 10px; margin-bottom: 2px;" class="q">masukan kode promo</h5>
            <input type="text">
</div>
<div style="margin-top: 14vw;">
    <input style="display: block;margin: 0 auto;width: 30%;" type="submit">
</div>
<h3 class="dtw">@Kotak TopUP</h3>
    <h3 class="dtw">Penyedia jasa TopUp terpercaya</h3>
</body>
</html>
